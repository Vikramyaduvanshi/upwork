<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>VibeRoom | Premium Real-time Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #38bdf8;
            --primary-dark: #0ea5e9;
            --bg-dark: #020617;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: linear-gradient(135deg, #38bdf8, #818cf8);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-btns { display: flex; gap: 15px; align-items: center; }

        .btn-login {
            background: var(--accent);
            color: #000;
            padding: 8px 24px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }

        /* --- HERO SECTION --- */
        .hero {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p { color: var(--text-muted); font-size: 1rem; }

        /* --- CHAT INTERFACE --- */
        .main-app {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            max-height: calc(100vh - 180px);
        }

        .chat-window {
            width: 100%;
            max-width: 1100px;
            height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background: rgba(15, 23, 42, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }

        .user-list { flex: 1; overflow-y: auto; padding: 10px; }

        .user-card {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .user-card:hover { background: rgba(255, 255, 255, 0.05); }

        .user-card.active {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .avatar {
            width: 45px; height: 45px;
            background: #334155;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--primary);
            border: 2px solid transparent;
        }

        .active .avatar { border-color: var(--primary); }

        .user-info .name { display: block; font-weight: 600; font-size: 0.95rem; }
        .user-info .status { font-size: 0.75rem; color: #22c55e; }

        /* --- CHAT AREA --- */
        .chat-content { flex: 1; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.2); }

        .chat-header {
            padding: 15px 25px;
            background: rgba(15, 23, 42, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .messages-display {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }

        .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            max-width: 70%;
            position: relative;
        }

        .bubble.me {
            background: var(--accent);
            color: #000;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .bubble.them {
            background: #1e293b;
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- INPUT AREA --- */
        .input-area {
            padding: 20px 25px;
            background: rgba(15, 23, 42, 0.4);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-area input {
            width: 100%;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-area input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.1); }

        .btn-send {
            background: var(--primary);
            border: none;
            width: 48px; height: 48px;
            border-radius: 12px;
            cursor: pointer;
            color: #000;
            transition: 0.3s;
        }

        .btn-send:hover { transform: scale(1.05); background: var(--primary-dark); }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar-header, .user-info { display: none; }
            .avatar { margin-right: 0; }
            .hero h1 { font-size: 1.8rem; }
            .chat-window { border-radius: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fa-solid fa-bolt-lightning"></i> VibeRoom</div>
    <div class="nav-btns">
        <button class="btn-login">Launch App</button>
    </div>
</header>

<section class="hero">
    <h1>Connect. Chat. <span style="color: var(--primary);">Vibe.</span></h1>
    <p>The next-generation chat experience for modern teams.</p>
</section>

<div class="main-app">
    <div class="chat-window">
        <div class="sidebar">
            <div class="sidebar-header">DIRECT MESSAGES</div>
            <div class="user-list">
                <div class="user-card active" onclick="selectUser('Rahul', this, 'R')">
                    <div class="avatar">R</div>
                    <div class="user-info">
                        <span class="name">Rahul Sharma</span>
                        <span class="status">Online</span>
                    </div>
                </div>
                <div class="user-card" onclick="selectUser('Priya', this, 'P')">
                    <div class="avatar">P</div>
                    <div class="user-info">
                        <span class="name">Priya Patel</span>
                        <span class="status" style="color: var(--text-muted)">Away</span>
                    </div>
                </div>
                <div class="user-card" onclick="selectUser('Aman', this, 'A')">
                    <div class="avatar">A</div>
                    <div class="user-info">
                        <span class="name">Aman Gupta</span>
                        <span class="status">Online</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-content">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <strong id="active-user-name">Rahul Sharma</strong>
                </div>
                <div style="color: var(--text-muted); cursor: pointer;">
                    <i class="fa-solid fa-video" style="margin-right: 15px;"></i>
                    <i class="fa-solid fa-circle-info"></i>
                </div>
            </div>

            <div class="messages-display" id="chat-box">
                <div class="msg-row">
                    <div class="bubble them">Welcome to the room! Start vibing.</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="msg-input" placeholder="Message Rahul..." autocomplete="off">
                </div>
                <button class="btn-send" onclick="handleSend()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentSelected = "Rahul";
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const activeHeader = document.getElementById('active-user-name');

    function selectUser(name, element, initial) {
        currentSelected = name;
        activeHeader.innerText = name + (name === "Rahul" ? " Sharma" : name === "Priya" ? " Patel" : " Gupta");
        msgInput.placeholder = `Message ${name}...`;

        // UI active class toggle
        document.querySelectorAll('.user-card').forEach(card => card.classList.remove('active'));
        element.classList.add('active');

        // Clear and show history dummy
        chatBox.innerHTML = `<div class="msg-row"><div class="bubble them">You are now chatting with ${name}</div></div>`;
    }

    function handleSend() {
        const text = msgInput.value.trim();
        if(!text) return;

        // User Message
        const myMsg = `
            <div class="msg-row me">
                <div class="bubble me">${text}</div>
            </div>
        `;
        chatBox.innerHTML += myMsg;
        msgInput.value = "";
        scrollDown();

        // Artificial "Typing" & Response
        setTimeout(() => {
            const typing = document.createElement('div');
            typing.id = "typing-indicator";
            typing.className = "msg-row";
            typing.innerHTML = `<div class="bubble them" style="font-style: italic; opacity: 0.7;">${currentSelected} is typing...</div>`;
            chatBox.appendChild(typing);
            scrollDown();

            setTimeout(() => {
                document.getElementById('typing-indicator').remove();
                const reply = `
                    <div class="msg-row">
                        <div class="bubble them">That sounds like a great idea, let's do it! 🚀</div>
                    </div>
                `;
                chatBox.innerHTML += reply;
                scrollDown();
            }, 1500);
        }, 500);
    }

    function scrollDown() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleSend();
    });
</script>

</body>
</html>
