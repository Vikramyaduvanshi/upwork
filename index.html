<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeRoom</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.btn {
  background: #38bdf8;
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #0ea5e9;
}

/* HERO */
.hero {
  text-align: center;
  padding: 50px 20px;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.hero p {
  color: #94a3b8;
}

/* CHAT */
.chat-container {
  display: flex;
  margin: 40px auto;
  width: 90%;
  height: 500px;
  border-radius: 12px;
  overflow: hidden;
  background: rgba(30, 41, 59, 0.6);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.sidebar {
  width: 25%;
  background: rgba(15, 23, 42, 0.8);
  padding: 15px;
}

.user {
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.user:hover {
  background: #334155;
}

.user.active {
  background: #38bdf8;
  color: black;
}

/* CHAT AREA */
.chat {
  width: 75%;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

/* MESSAGE */
.msg {
  margin: 10px 0;
  padding: 10px 14px;
  border-radius: 12px;
  max-width: 60%;
  font-size: 14px;
  animation: fadeIn 0.3s ease;
}

.msg.you {
  background: #38bdf8;
  color: black;
  margin-left: auto;
}

.msg.other {
  background: #1e293b;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* INPUT */
.input {
  display: flex;
  padding: 10px;
  background: #020617;
}

.input input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: #1e293b;
  color: white;
}

.input button {
  margin-left: 10px;
  background: #38bdf8;
  border: none;
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
}

.input button:hover {
  background: #0ea5e9;
}
</style>
</head>

<body>

<header>
  <div class="logo">VibeRoom</div>
  <div class="btn">Login</div>
</header>

<section class="hero">
  <h1>Connect. Chat. Vibe.</h1>
  <p>Real-time conversations with modern UI</p>
</section>

<div class="chat-container">

  <div class="sidebar">
    <div class="user" onclick="selectUser('Rahul', this)">Rahul</div>
    <div class="user" onclick="selectUser('Priya', this)">Priya</div>
    <div class="user" onclick="selectUser('Aman', this)">Aman</div>
  </div>

  <div class="chat">
    <div class="messages" id="messages"></div>

    <div class="input">
      <input id="input" placeholder="Type a message"/>
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>
let currentUser = null;

const messagesBox = document.getElementById("messages");
const input = document.getElementById("input");

// Select user
function selectUser(name, el) {
  currentUser = name;

  document.querySelectorAll(".user").forEach(u => u.classList.remove("active"));
  el.classList.add("active");

  messagesBox.innerHTML = `
    <div class="msg other">Chatting with ${name}</div>
  `;
}

// Send message
function send() {
  const msg = input.value.trim();

  if (!msg || !currentUser) return;

  messagesBox.innerHTML += `<div class="msg you">${msg}</div>`;
  scrollToBottom();

  setTimeout(() => {
    messagesBox.innerHTML += `<div class="msg other">${currentUser}: Nice!</div>`;
    scrollToBottom();
  }, 800);

  input.value = "";
}

// Auto scroll
function scrollToBottom() {
  messagesBox.scrollTop = messagesBox.scrollHeight;
}

// Enter key support
input.addEventListener("keypress", function (e) {
  if (e.key === "Enter") send();
});

// Empty state
messagesBox.innerHTML = `<p style="color:#64748b;">Select a user to start chatting</p>`;
</script>

</body>
</html>
